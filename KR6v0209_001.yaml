body:
  text: 太和十六年道人僧暈為七帝建三丈八彌勒像二菩薩丈造素至景明二鑄鐫訖竟正始二歲次乙酉二月壬寅朔四日銘旨三州教化大像用赤金卅六万六千四百斤黃金二千一百斤二菩薩用赤金四万六千斤黃金一千一百斤大魏今上皇帝陛下忠慕玄追孝誠通敏班旨三州率宣功就略表始末銘之後代耳七寶瓶前定州刺史彭城王元勰定州刺史城陽王元鸞
